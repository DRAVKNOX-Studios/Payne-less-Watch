name: Release

# Triggers only when you push a version tag like: git tag v1.0.0 && git push --tags
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Build & Publish Signed APK
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create GitHub Releases

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # Decode the base64 keystore stored in GitHub Secrets and write it to disk
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > keystore.jks

      - name: Build signed release APK
        run: |
          ./gradlew assembleRelease \
            -Pandroid.injected.signing.store.file=${{ github.workspace }}/keystore.jks \
            -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
            -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
            -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}

      # Get the version number from the tag for the release title
      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_OUTPUT

      # Rename to a fixed filename so the /releases/latest/download/ URL never changes
      - name: Rename APK
        run: |
          mv app/build/outputs/apk/release/app-release.apk \
             "Payne-less-Typer.apk"

      # Clean up the keystore immediately after signing - don't leave it on the runner
      - name: Clean up keystore
        if: always()
        run: rm -f keystore.jks

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Payne-less: Typer ${{ steps.version.outputs.VERSION }}"
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: "Payne-less-Typer.apk"
          fail_on_unmatched_files: true
